<div class="container">
    <section class="bg-body-secondary p-4">
        <h1 class="text-primary display-3 fw-bold">Paises</h1>
        <button class="btn btn-primary mb-4" type="button" (click)="cargarPaises()">
            Mostrar Paises
        </button>
        <h2>Cantidad de Paises: {{countries.length}}</h2>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>
                        Flag
                    </th>
                    <th>
                        Name
                    </th>
                    <th>
                        IsoCode
                    </th>
                    <th>
                        PhoneCode
                    </th>
                </tr>
            </thead>
            <tbody>
                @for (pais of countries; track pais.isoCode) {
                <tr>

                    <td>
                        {{pais.flag}}
                    </td>
                    <td>
                        {{pais.name}}
                    </td>
                    <td>
                        {{pais.isoCode}}
                    </td>
                    <td>
                        {{pais.phonecode}}
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </section>

</div>
